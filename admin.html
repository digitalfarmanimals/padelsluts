<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KOURT KING — Command Desk</title>
<link rel="icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400..900;1,400..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0B0D; --bg2:#101216; --card:#15181E; --card2:#1B1F26;
    --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.18);
    --volt:#C7F23D; --volt-d:#A6CC2A; --gold:#E8B931; --green:#5bd17a;
    --white:#F4F6F2; --dim:#878E99; --dim2:#5A616B;
    --danger:#ff5a5f; --label:'Archivo',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--white);font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;padding:0 0 60px}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px}
  a{color:inherit}
  .mono{width:38px;height:38px;border-radius:50%;background:var(--volt);display:flex;align-items:center;justify-content:center;font-family:var(--label);font-weight:900;font-style:italic;color:#0A0B0D;font-size:22px;flex:none}

  header{position:sticky;top:0;z-index:20;background:rgba(10,11,13,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:14px;height:66px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .wm{font-family:var(--label);font-weight:900;font-style:italic;font-size:17px}
  .brand .wm i{color:var(--volt);font-style:italic}
  .brand .sub{font-family:var(--label);font-weight:700;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-top:1px}
  .who{font-size:12.5px;color:var(--dim);text-align:right}
  .who a{color:var(--dim);text-decoration:underline;cursor:pointer;font-weight:700}

  .gate{max-width:440px;margin:14vh auto 0;text-align:center;padding:0 20px}
  .gate .mono{margin:0 auto 18px;width:54px;height:54px;font-size:30px}
  .gate h1{font-family:'Anton';font-size:30px;text-transform:uppercase;margin-bottom:10px}
  .gate p{color:var(--dim);margin-bottom:20px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--label);font-weight:800;font-size:13px;letter-spacing:.05em;text-transform:uppercase;border-radius:12px;padding:13px 20px;cursor:pointer;border:1.5px solid transparent;transition:.15s;text-decoration:none}
  .btn.volt{background:var(--volt);color:#0A0B0D}
  .btn.volt:hover{filter:brightness(1.07)}
  .btn.ghost{background:transparent;color:var(--white);border-color:var(--line2)}
  .btn.ghost:hover{border-color:var(--volt);color:var(--volt)}
  .btn.sm{padding:8px 12px;font-size:11px;border-radius:9px}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:26px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 18px}
  .stat .n{font-family:'Anton';font-size:38px;line-height:1;color:var(--volt)}
  .stat .l{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-top:8px;font-family:var(--label);font-weight:700}

  .tabs{display:flex;gap:8px;margin:8px 0 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tab{font-family:var(--label);font-weight:800;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--dim);background:none;border:0;border-bottom:2px solid transparent;padding:12px 6px;cursor:pointer;margin-bottom:-1px}
  .tab.on{color:var(--white);border-bottom-color:var(--volt)}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .toolbar select,.toolbar input{background:var(--card2);border:1px solid var(--line);color:var(--white);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:14px;outline:none}
  .toolbar select:focus,.toolbar input:focus{border-color:var(--volt)}
  .toolbar .search{min-width:200px;flex:1;max-width:320px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .ent{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
  .ent.shortlist{border-color:var(--volt)}
  .vid{position:relative;aspect-ratio:9/12;background:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
  .vid video{width:100%;height:100%;object-fit:contain;background:#000}
  .vid .play{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--volt)}
  .vid .play svg{width:46px;height:46px}
  .vid .play .pt{font-family:var(--label);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
  .ent .meta{padding:14px}
  .ent .nm{font-family:var(--label);font-weight:900;font-style:italic;text-transform:uppercase;font-size:17px}
  .ent .ci{color:var(--volt);font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
  .ent .pitch{color:var(--dim);font-size:14px;margin-top:8px;font-style:italic}
  .ent .sub2{color:var(--dim2);font-size:11.5px;margin-top:8px;display:flex;justify-content:space-between;gap:8px}
  .ent .acts{display:flex;gap:6px;padding:0 14px 14px;flex-wrap:wrap}
  .ent .acts .btn{flex:1;min-width:72px}
  .pill{display:inline-block;font-family:var(--label);font-weight:800;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:1px solid var(--line2);color:var(--dim)}
  .pill.shortlist{color:var(--volt);border-color:var(--volt)}
  .pill.cast{color:#0A0B0D;background:var(--volt);border-color:var(--volt)}
  .pill.pass{color:var(--danger);border-color:rgba(255,90,95,.4)}

  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:11px 10px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  th{font-family:var(--label);font-weight:800;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
  .muted{color:var(--dim)}
  .empty{text-align:center;color:var(--dim);padding:50px 20px;border:1px dashed var(--line);border-radius:16px}
  .hide{display:none}

  /* waitlist demand bars */
  .race{max-width:560px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:22px}
  .race-h{font-family:var(--label);font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:11px;color:var(--dim);margin-bottom:8px}
  .race-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--line)}
  .race-row:first-of-type{border-top:0}
  .race-rank{font-family:'Anton';font-size:17px;color:var(--volt);width:24px;text-align:center;flex:none}
  .race-city{flex:1;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .race-bar{flex:0 0 100px;height:6px;border-radius:6px;background:var(--card2);overflow:hidden}
  .race-bar i{display:block;height:100%;background:var(--volt);border-radius:6px}
  .race-n{font-family:var(--label);font-weight:700;font-size:13px;color:var(--dim);width:40px;text-align:right;flex:none}

  /* outreach board */
  .obreak{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .ob{font-family:var(--label);font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 11px}
  .ob b{color:var(--white)}
  .ocard{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-left:3px solid var(--dim2);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:11px}
  .ocard:hover{border-color:var(--line2)}
  .ocard.st-contacted{border-left-color:var(--volt)} .ocard.st-talks{border-left-color:var(--gold)}
  .ocard.st-closed{border-left-color:var(--green)} .ocard.st-passed{border-left-color:var(--danger);opacity:.62}
  .otop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .onm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;letter-spacing:-.01em;line-height:1.15;color:var(--white)}
  .oh{color:var(--dim);font-size:12px;margin-top:2px}
  .oprio{font-family:'Anton';font-size:13px;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none;border:1px solid var(--line2);color:var(--dim)}
  .oprio.A{background:var(--volt);color:#0A0B0D;border-color:var(--volt)} .oprio.B{color:var(--white)}
  .owhy{font-size:13.5px;color:#c9cec6;line-height:1.55}
  .onote{font-size:12px;color:var(--dim2);font-style:italic;line-height:1.45}
  .octrl{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:2px}
  .octrl select,.octrl input,.onotes{background:var(--card2);border:1px solid var(--line);color:var(--white);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:13px;outline:none}
  .octrl select:focus,.octrl input:focus,.onotes:focus{border-color:var(--volt)}
  .octrl input::placeholder,.onotes::placeholder{color:var(--dim2)}
  .octrl select{font-family:var(--label);font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
  .octrl .owner{width:104px} .onotes{width:100%;margin-top:2px}
  .cat-chip{font-family:var(--label);font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);}
</style>
</head>

native."}, {"cat": "brands", "n": "Vitality", "h": "health insurer", "r": "UK", "p": "B", "w": "Already 'powers' The Padel Directory and sponsors UK cricket/parkrun. Wellness brand with a participation story that fits your platform.", "note": "Powers a UK padel platform already."}, {"cat": "brands", "n": "adidas Padel", "h": "@adidas", "r": "Global", "p": "B", "w": "Hexagon Cup official racket, huge budget, design-led. Endemic kit/equipment sponsor with crossover cool.", "note": "Endemic + lifestyle."}, {"cat": "brands", "n": "Bullpadel", "h": "endemic gear", "r": "Top-3 padel", "p": "B", "w": "Official Premier Padel partner and a top-three padel-specific brand. The natural official-racket/apparel sponsor.", "note": "Padel-endemic equipment."}, {"cat": "brands", "n": "Revolut / Monzo", "h": "fintech", "r": "UK", "p": "C", "w": "UK fintechs spend hard to reach young users — non-endemic title-sponsor wildcards (cf. Revolut x football).", "note": "Cross-category swing."}, {"cat": "brands", "n": "Three / EE", "h": "telco", "r": "UK", "p": "C", "w": "UK telcos with big sport-sponsorship budgets and a young-audience mandate.", "note": "Cross-category swing."}, {"cat": "wider", "n": "The Sidemen", "h": "@Sidemen", "r": "23M+ subs", "p": "A", "w": "The blueprint you're applying to padel. Their 2026 charity match sold out 90k at Wembley, peaked at 2.2M concurrent viewers and raised £6.2M. KSI is a member — your Mams link runs straight through here.", "note": "Proof of model + talent pool + warm via KSI."}, {"cat": "wider", "n": "Beta Squad", "h": "@betasquad", "r": "Millions", "p": "A", "w": "UK creator collective that runs its own sell-out charity football match (Selhurst Park). Exactly the character-led, format-driven energy you want seeding and starring.", "note": "Collective; charity-match operators."}, {"cat": "wider", "n": "AngryGinge", "h": "football streamer", "r": "1.5M Twitch / 1M YT", "p": "A", "w": "FIFA/football streamer, I'm a Celeb 2025 winner, huge current UK   const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlldXlqZ2p4eXBxZmx5bmVwaGhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDE3ODYsImV4cCI6MjA5NzI3Nzc4Nn0.JsOcrIJ19_LS1WX5h4Sjeh-lOENV2GZr28BFd8uuW9M";
  // Who can see this desk. Add your partner's email here (the one they log into the KOURT app with).
  const ADMINS=["digitalfarmanimals@gmail.com"];
  let sb=null; try{ sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); }catch(e){}

  const $=function(id){return document.getElementById(id);};
  const esc=function(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});};
  const OSTATUS=[["todo","To contact"],["contacted","Contacted"],["talks","In talks"],["closed","Closed"],["passed","Passed"]];
  const CATMAP=(typeof CATS!=="undefined")?Object.fromEntries(CATS.map(function(c){return [c[0],c[1]];})):{};
  let entries=[], signups=[], waitlist=[], ostatus={}, tab="auditions", filterCity="", me=null;
  let oCat="all", oPrio="", oStat="", oSearch="";

  function PLAY(){return '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="11" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M10 8l6 4-6 4z"/></svg>';}

  async function boot(){
    if(!sb){ gate("Can't reach the server.", ""); return; }
    var s=null; try{ s=(await sb.auth.getSession()).data.session; }catch(e){}
    me = s && s.user ? s.user : null;
    if(!me){ return gate("Sign in to continue", '<p>Sign in to the KOURT app first, then come back here.</p><a class="btn volt" href="app.html">Open the KOURT app →</a>'); }
    if(ADMINS.indexOf((me.email||"").toLowerCase())<0){ return gate("Not authorised", '<p>'+esc(me.email||"")+' doesn\'t have access to the command desk.</p><a class="btn ghost" href="app.html">Back to the app</a>'); }
    $("who").innerHTML = esc(me.email)+' · <a onclick="signOut()">Sign out</a>';
    await loadData();
  }
  function gate(title, body){
    $("who").innerHTML="";
    $("view").innerHTML='<div class="gate"><div class="mono">K</div><h1>'+esc(title)+'</h1>'+body+'</div>';
  }
  async function signOut(){ try{ await sb.auth.signOut(); }catch(e){} location.reload(); }

  async function loadData(){
    $("view").innerHTML='<div class="wrap"><div class="empty" style="margin-top:40px">Loading the desk…</div></div>';
    try{ var e=await sb.from("kk_entries").select("*").order("created_at",{ascending:false}); entries=(e.data)||[]; }catch(err){}
    try{ var g=await sb.from("kings_signups").select("*").order("created_at",{ascending:false}); signups=(g.data)||[]; }catch(err){}
    try{ var w=await sb.from("city_waitlist").select("*").order("created_at",{ascending:false}); waitlist=(w.data)||[]; }catch(err){}
    try{ var o=await sb.from("outreach_status").select("*"); ostatus={}; ((o.data)||[]).forEach(function(r){ ostatus[r.contact_key]=r; }); }catch(err){}
    render();
  }

  function statusPill(s){ s=s||"new"; var cls=(s==="shortlist"||s==="cast"||s==="pass")?s:""; var lbl=s==="new"?"New":s.charAt(0).toUpperCase()+s.slice(1); return '<span class="pill '+cls+'">'+lbl+'</span>'; }
  function stat(n,l){ return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }
  function fmtDate(d){ if(!d) return ""; try{ return new Date(d).toLocaleDateString(undefined,{day:"numeric",month:"short"}); }catch(e){ return ""; } }

  function render(){
    var oWorked=Object.values(ostatus).filter(function(r){return r.status&&r.status!=="todo";}).length;
    var html='<div class="wrap">';
    html+='<div class="stats">'
      +stat(entries.length,"Auditions")
      +stat(signups.length,"Email sign-ups")
      +stat(waitlist.length,"Waitlist")
      +stat((typeof DATA!=="undefined"?DATA.length:0),"Outreach targets")
      +stat(oWorked,"Outreach worked")
      +'</div>';
    html+='<div class="tabs">'
      +tabBtn("auditions","Auditions")+tabBtn("signups","Sign-ups")+tabBtn("waitlist","Waitlist")+tabBtn("outreach","Outreach")
      +'</div>';
    if(tab==="auditions") html+=renderAuditions();
    else if(tab==="signups") html+=renderSignups();
    else if(tab==="waitlist") html+=renderWaitlist();
    else if(tab==="outreach") html+=renderOutreach();
    html+='</div>';
    $("view").innerHTML=html;
  }
  function tabBtn(t,l){ return '<button class="tab '+(tab===t?"on":"")+'" onclick="setTab(\''+t+'\')">'+l+'</button>'; }

  /* ---- AUDITIONS ---- */
  function shownEntries(){ return entries.filter(function(e){ return !filterCity || (e.city||"").trim()===filterCity; }); }
  function renderAuditions(){
    var cities=[...new Set(entries.map(function(e){return (e.city||"").trim();}).filter(Boolean))].sort();
    var html='<div class="toolbar"><select onchange="setCity(this.value)"><option value="">All cities</option>'+cities.map(function(c){return '<option value="'+esc(c)+'"'+(filterCity===c?" selected":"")+'>'+esc(c)+'</option>';}).join("")+'</select><span class="muted" style="font-size:13px">'+shownEntries().length+' shown</span></div>';
    var list=shownEntries();
    if(!list.length) return html+'<div class="empty">No auditions yet.<br><span class="muted">They\'ll appear here the moment someone enters the hunt.</span></div>';
    return html+'<div class="grid">'+list.map(entryCard).join("")+'</div>';
  }
  function entryCard(e){
    return '<div class="ent '+(e.status==="shortlist"?"shortlist":"")+'" id="ent-'+e.id+'">'
      +'<div class="vid" onclick="playVid(\''+e.id+'\')" id="vid-'+e.id+'"><div class="play">'+PLAY()+'<span class="pt">Play audition</span></div></div>'
      +'<div class="meta"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div><div class="nm">'+esc(e.name||"—")+'</div><div class="ci">'+esc(e.city||"")+(e.handle?' · '+esc(e.handle):"")+'</div></div>'+statusPill(e.status)+'</div>'
      +(e.pitch?'<div class="pitch">"'+esc(e.pitch)+'"</div>':"")
      +'<div class="sub2"><span>'+fmtDate(e.created_at)+'</span><span>'+(e.file_size?Math.round(e.file_size/1048576)+' MB':"")+'</span></div></div>'
      +'<div class="acts"><button class="btn ghost sm" onclick="setStatus(\''+e.id+'\',\'shortlist\')">Shortlist</button><button class="btn volt sm" onclick="setStatus(\''+e.id+'\',\'cast\')">Cast</button><button class="btn ghost sm" onclick="setStatus(\''+e.id+'\',\'pass\')">Pass</button></div>'
      +'</div>';
  }
  async function playVid(id){
    var e=entries.find(function(x){return x.id===id;}); if(!e||!e.video_path) return;
    var box=$("vid-"+id); box.innerHTML='<div class="play"><span class="pt">Loading…</span></div>';
    var key=String(e.video_path).replace(/^auditions\//,"");
    try{ var r=await sb.storage.from("auditions").createSignedUrl(key,3600); var url=r.data&&r.data.signedUrl;
      if(url){ box.onclick=null; box.innerHTML='<video src="'+url+'" controls autoplay playsinline></video>'; } else throw 0;
    }catch(err){ box.innerHTML='<div class="play"><span class="pt" style="color:var(--danger)">Can\'t load video</span></div>'; }
  }
  async function setStatus(id,status){ var e=entries.find(function(x){return x.id===id;}); if(!e) return; var prev=e.status; e.status=status; try{ await sb.from("kk_entries").update({status:status}).eq("id",id); }catch(err){ e.status=prev; } render(); }

  /* ---- SIGN-UPS (kings_signups) ---- */
  function renderSignups(){
    if(!signups.length) return '<div class="empty">No sign-ups yet.</div>';
    return '<div class="toolbar"><button class="btn ghost sm" onclick="copyEmails(signups)">Copy all emails</button><span class="muted" style="font-size:13px">'+signups.length+' total</span></div>'
      +'<table><thead><tr><th>Email</th><th>Source</th><th>When</th></tr></thead><tbody>'+signups.map(function(s){return '<tr><td>'+esc(s.email)+'</td><td class="muted">'+esc(s.source||"")+'</td><td class="muted">'+fmtDate(s.created_at)+'</td></tr>';}).join("")+'</tbody></table>';
  }

  /* ---- WAITLIST (city_waitlist) — demand by city ---- */
  function renderWaitlist(){
    if(!waitlist.length) return '<div class="empty">No waitlist sign-ups yet.<br><span class="muted">The city presave on the homepage feeds this.</span></div>';
    var by={}; waitlist.forEach(function(w){ var c=(w.city||"—").trim(); by[c]=(by[c]||0)+1; });
    var ranked=Object.keys(by).map(function(c){return [c,by[c]];}).sort(function(a,b){return b[1]-a[1];});
    var max=ranked[0][1]||1;
    var html='<div class="race"><div class="race-h">Cities leading the race</div>'+ranked.slice(0,12).map(function(r,i){var pct=Math.max(8,Math.round(r[1]/max*100));return '<div class="race-row"><span class="race-rank">'+(i+1)+'</span><span class="race-city">'+esc(r[0])+'</span><span class="race-bar"><i style="width:'+pct+'%"></i></span><span class="race-n">'+r[1]+'</span></div>';}).join("")+'</div>';
    html+='<div class="toolbar"><button class="btn ghost sm" onclick="copyEmails(waitlist)">Copy all emails</button><span class="muted" style="font-size:13px">'+waitlist.length+' people · '+ranked.length+' cities</span></div>';
    html+='<table><thead><tr><th>Email</th><th>City</th><th>When</th></tr></thead><tbody>'+waitlist.map(function(w){return '<tr><td>'+esc(w.email)+'</td><td>'+esc(w.city||"")+'</td><td class="muted">'+fmtDate(w.created_at)+'</td></tr>';}).join("")+'</tbody></table>';
    return html;
  }
  function copyEmails(list){ var txt=list.map(function(s){return s.email;}).join("\n"); try{ navigator.clipboard.writeText(txt); alert("Copied "+list.length+" emails."); }catch(e){ prompt("Copy these:", txt); } }

  /* ---- OUTREACH tracker ---- */
  function oOf(name){ return ostatus[name]||{}; }
  function renderOutreach(){
    if(typeof DATA==="undefined") return '<div class="empty">Outreach board not loaded.</div>';
    var counts={}; OSTATUS.forEach(function(s){counts[s[0]]=0;});
    DATA.forEach(function(d){ var st=(oOf(d.n).status)||"todo"; counts[st]=(counts[st]||0)+1; });
    var breakdown='<div class="obreak">'+OSTATUS.map(function(s){return '<span class="ob"><b>'+counts[s[0]]+'</b> '+s[1]+'</span>';}).join("")+'</div>';
    var catOpts='<option value="all">All categories</option>'+CATS.filter(function(c){return c[0]!=="all";}).map(function(c){return '<option value="'+c[0]+'"'+(oCat===c[0]?" selected":"")+'>'+esc(c[1])+'</option>';}).join("");
    var prioOpts='<option value="">All priority</option>'+["A","B","C"].map(function(p){return '<option value="'+p+'"'+(oPrio===p?" selected":"")+'>Priority '+p+'</option>';}).join("");
    var statOpts='<option value="">All status</option>'+OSTATUS.map(function(s){return '<option value="'+s[0]+'"'+(oStat===s[0]?" selected":"")+'>'+s[1]+'</option>';}).join("");
    var toolbar='<div class="toolbar"><select onchange="oSet(\'cat\',this.value)">'+catOpts+'</select><select onchange="oSet(\'prio\',this.value)">'+prioOpts+'</select><select onchange="oSet(\'stat\',this.value)">'+statOpts+'</select><input class="search" placeholder="Search names…" value="'+esc(oSearch)+'" oninput="oSet(\'search\',this.value)"></div>';
    var list=DATA.map(function(d,i){return [d,i];}).filter(function(p){
      var d=p[0], st=(oOf(d.n).status)||"todo";
      if(oCat!=="all" && d.cat!==oCat) return false;
      if(oPrio && d.p!==oPrio) return false;
      if(oStat && st!==oStat) return false;
      if(oSearch){ var q=oSearch.toLowerCase(); if((d.n+" "+(d.h||"")+" "+(d.w||"")).toLowerCase().indexOf(q)<0) return false; }
      return true;
    });
    var body = list.length ? '<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(320px,1fr))">'+list.map(function(p){return outreachCard(p[0],p[1]);}).join("")+'</div>'
                            : '<div class="empty">No targets match those filters.</div>';
    return breakdown+toolbar+'<div class="muted" style="font-size:13px;margin-bottom:12px">'+list.length+' of '+DATA.length+' targets</div>'+body;
  }
  function outreachCard(d,i){
    var o=oOf(d.n), st=o.status||"todo";
    var statSel='<select onchange="setO('+i+',\'status\',this.value)">'+OSTATUS.map(function(s){return '<option value="'+s[0]+'"'+(st===s[0]?" selected":"")+'>'+s[1]+'</option>';}).join("")+'</select>';
    return '<div class="ocard st-'+st+'">'
      +'<div class="otop"><div><div class="onm">'+esc(d.n)+'</div><div class="oh">'+esc(d.h||"")+(d.r?' · '+esc(d.r):"")+'</div></div><span class="oprio '+esc(d.p)+'">'+esc(d.p)+'</span></div>'
      +'<div class="cat-chip">'+esc(CATMAP[d.cat]||d.cat)+'</div>'
      +(d.w?'<div class="owhy">'+esc(d.w)+'</div>':"")
      +(d.note?'<div class="onote">'+esc(d.note)+'</div>':"")
      +'<div class="octrl">'+statSel+'<input class="owner" placeholder="Owner" value="'+esc(o.owner||"")+'" onchange="setO('+i+',\'owner\',this.value)"></div>'
      +'<input class="onotes" placeholder="Add a note…" value="'+esc(o.notes||"")+'" onchange="setO('+i+',\'notes\',this.value)">'
      +'</div>';
  }
  async function setO(i, field, value){
    var d=DATA[i]; if(!d) return; var key=d.n;
    var row=ostatus[key]||{contact_key:key, status:"todo", owner:"", notes:""};
    row[field]=value; ostatus[key]=row;
    var payload={contact_key:key, status:row.status||"todo", owner:row.owner||null, notes:row.notes||null};
    try{ await sb.from("outreach_status").upsert(payload,{onConflict:"contact_key"}); }catch(err){}
    if(field==="status") render(); // refresh colours + counts; owner/notes persist in the field
  }
  function oSet(k,v){ if(k==="cat")oCat=v; else if(k==="prio")oPrio=v; else if(k==="stat")oStat=v; else if(k==="search")oSearch=v; render(); if(k==="search"){ var el=document.querySelector(".toolbar .search"); if(el){ el.focus(); el.setSelectionRange(el.value.length,el.value.length);} } }

  function setTab(t){ tab=t; render(); }
  function setCity(c){ filterCity=c; render(); }

  boot();
</script>
</body>
</html>
