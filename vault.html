<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>KOURT KING — Confidential</title>
<link rel="icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400..900;1,400..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0B0D; --bg2:#101216; --card:#15181E; --card2:#1B1F26;
    --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.18);
    --volt:#C7F23D; --white:#F4F6F2; --dim:#878E99; --dim2:#5A616B; --danger:#ff5a5f;
    --label:'Archivo',system-ui,sans-serif; --bar:58px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{background:var(--bg)}
  body{background:transparent;color:var(--white);font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.55;min-height:100vh}
  .bgvid{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2}
  .bgscrim{position:fixed;inset:0;background:rgba(8,9,11,.82);z-index:-1}
  .mono{width:42px;height:42px;border-radius:50%;background:var(--volt);display:flex;align-items:center;justify-content:center;font-family:var(--label);font-weight:900;font-style:italic;color:#0A0B0D;font-size:25px;flex:none}
  .eyebrow{font-family:var(--label);font-weight:800;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--volt)}
  .crown{width:46px;height:42px;color:var(--volt);display:block;margin:0 auto 14px}
  .crown svg{width:100%;height:100%;display:block}

  /* gate */
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 22px}
  .lock{max-width:460px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:34px 28px;text-align:center}
  .lock h1{font-family:'Anton';font-size:30px;text-transform:uppercase;letter-spacing:.01em;margin:14px 0 12px}
  .clause{color:var(--dim);font-size:14.5px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;text-align:left;margin:8px 0 20px}
  .fld{display:block;text-align:left;font-family:var(--label);font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin:0 0 6px}
  input[type=email],input[type=password]{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--white);border-radius:12px;padding:14px 15px;font-size:16px;font-family:inherit;outline:none;margin-bottom:14px;transition:border-color .15s}
  input:focus{border-color:var(--volt)}
  .agree{display:flex;gap:10px;align-items:flex-start;text-align:left;font-size:13.5px;color:var(--dim);margin-bottom:18px;cursor:pointer}
  .agree input{margin-top:3px;width:17px;height:17px;accent-color:var(--volt);flex:none}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;font-family:var(--label);font-weight:800;font-size:14px;letter-spacing:.05em;text-transform:uppercase;border-radius:13px;padding:15px 20px;cursor:pointer;border:1.5px solid transparent;background:var(--volt);color:#0A0B0D;transition:.15s}
  .btn:hover{filter:brightness(1.07)}
  .btn:disabled{opacity:.55;cursor:default}
  .err{color:var(--danger);font-size:13px;margin-top:12px;min-height:0}
  .foot{color:var(--dim2);font-size:11px;letter-spacing:.08em;margin-top:18px}

  /* viewer (revealed) */
  .docs{display:none}
  .vbar{position:fixed;top:0;left:0;right:0;height:var(--bar);z-index:30;display:flex;align-items:center;justify-content:space-between;gap:14px;
        padding:0 18px;background:rgba(10,11,13,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px;flex:none}
  .brand .mono{width:32px;height:32px;font-size:19px}
  .brand .wm{font-family:var(--label);font-weight:900;font-style:italic;font-size:15px;white-space:nowrap}
  .brand .wm i{color:var(--volt)}
  .tabs{display:flex;gap:4px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:100px;padding:4px;overflow:auto;-ms-overflow-style:none;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{font-family:var(--label);font-weight:800;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);
       background:transparent;border:0;border-radius:100px;padding:8px 15px;cursor:pointer;white-space:nowrap;transition:.15s}
  .tab:hover{color:var(--white)}
  .tab.on{background:var(--volt);color:#0A0B0D}
  .conf{font-family:var(--label);font-weight:800;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--danger);border:1px solid rgba(255,90,95,.4);border-radius:999px;padding:5px 11px;flex:none}
  .vright{display:flex;align-items:center;gap:10px;flex:none}
  .dlpack{font-family:var(--label);font-weight:800;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#0A0B0D;background:var(--volt);border-radius:100px;padding:8px 14px;text-decoration:none;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
  .dlpack:hover{filter:brightness(1.07)}
  .viewer{position:fixed;top:var(--bar);left:0;right:0;bottom:0;overflow:hidden;background:var(--bg)}
  .pane{position:absolute;inset:0;display:none}
  .pane.on{display:block}
  .screens{position:absolute;inset:0;overflow-y:auto;padding:26px 16px 60px;text-align:center;-webkit-overflow-scrolling:touch}
  .screens img{display:block;width:100%;max-width:1120px;margin:0 auto 16px;border-radius:8px;box-shadow:0 14px 40px rgba(0,0,0,.55);background:#15181E;-webkit-user-drag:none}
  .pane iframe{width:100%;height:100%;border:0;display:block;background:var(--bg)}
  .vwm{position:absolute;inset:0;pointer-events:none;z-index:20;display:none}
  .endnote{color:var(--dim2);font-size:12px;max-width:1120px;margin:6px auto 0;padding-top:18px;border-top:1px solid var(--line)}
  @media(max-width:680px){
    :root{--bar:54px}
    .vbar{padding:0 12px;gap:8px}
    .brand .wm{display:none}
    .tab{padding:7px 11px;font-size:11px}
    .conf{display:none}
  }
</style>
</head>
<body oncontextmenu="return false">
<video class="bgvid" autoplay muted loop playsinline preload="auto"><source src="hero.mp4" type="video/mp4"></video>
<div class="bgscrim"></div>

  <!-- GATE -->
  <div class="gate" id="gate">
    <div class="lock">
      <span class="crown" id="crownHolder"></span>
      <div class="eyebrow">KOURT KING · Confidential</div>
      <h1>Confidential materials</h1>
      <div class="clause">The documents beyond this point are <b style="color:var(--white)">strictly confidential</b>. By continuing you confirm you've been granted access, and agree not to share, copy or distribute them.</div>
      <label class="fld">Your email</label>
      <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="you@email.com">
      <label class="fld">Access code</label>
      <input id="code" type="password" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="Enter the code you were given">
      <label class="agree"><input type="checkbox" id="agree"> <span>I understand these materials are confidential and agree not to share them.</span></label>
      <button class="btn" id="unlock" onclick="unlock()">Unlock documents</button>
      <div class="err" id="err"></div>
      <div class="foot">Access is recorded.</div>
    </div>
  </div>

  <!-- VIEWER (revealed after unlock) -->
  <div class="docs" id="docs">
    <div class="vbar">
      <span class="brand"><span class="mono">K</span><span class="wm">KOURT<i>KING</i></span></span>
      <div class="tabs">
        <button class="tab on" data-pane="creative" onclick="tab('creative')">Creative</button>
        <button class="tab" data-pane="format" onclick="tab('format')">The Format</button>
        <button class="tab" data-pane="invest" onclick="tab('invest')">Investment</button>
      </div>
      <a class="dlpack" href="vault/kourt-king-pack.pdf" download="Kourt King Pack.pdf">⤓ Download pack</a>
    </div>
    <div class="viewer">
      <div class="pane on" id="pane-creative">
        <div class="screens" id="creativeScreens"></div>
      </div>
      <div class="pane" id="pane-format"><iframe id="if-format" title="The Format" loading="lazy" referrerpolicy="no-referrer"></iframe></div>
      <div class="pane" id="pane-invest"><iframe id="if-invest" title="Investment Case" loading="lazy" referrerpolicy="no-referrer"></iframe></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Access code is stored as a SHA-256 hash (not the plain code). Current code: "kourtking2026"
  // To change it: run  printf '%s' 'YOURNEWCODE' | shasum -a 256  and paste the hash below.
  const CODE_HASH="ec81454e9c3cf7b59499f6e4b3218ccf09cf83068fc5be0bed88b750f319f2d7";

  const SUPABASE_URL="https://yeuyjgjxypqflynephhq.supabase.co";
  const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlldXlqZ2p4eXBxZmx5bmVwaGhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDE3ODYsImV4cCI6MjA5NzI3Nzc4Nn0.JsOcrIJ19_LS1WX5h4Sjeh-lOENV2GZr28BFd8uuW9M";
  let sb=null; try{ sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); }catch(e){}

  document.getElementById("crownHolder").innerHTML='<svg viewBox="0 0 24 22" fill="currentColor" aria-hidden="true"><path d="M3 7L7 11 12 4 17 11 21 7 19.4 19.5 4.6 19.5Z"/></svg>';

  // Creative & Format decks = page images (view-only, no download). Update if page counts change.
  const CREATIVE_PAGES=11;
  const IFRAME_SRC={ format:"vault/format.html", invest:"vault/investment.html" };
  const loaded={};

  async function sha256(str){
    const buf=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }

  async function unlock(){
    const email=(document.getElementById("email").value||"").trim().toLowerCase();
    const code=(document.getElementById("code").value||"").trim().toLowerCase();
    const agreed=document.getElementById("agree").checked;
    const err=document.getElementById("err");
    err.textContent="";
    if(!/^.+@.+\..+$/.test(email)){ err.textContent="Enter a valid email."; return; }
    if(!agreed){ err.textContent="Please tick the box to confirm you'll keep these confidential."; return; }
    if(!code){ err.textContent="Enter the access code."; return; }
    const btn=document.getElementById("unlock"); btn.disabled=true; btn.textContent="Checking…";
    let ok=false; try{ ok=(await sha256(code))===CODE_HASH; }catch(e){}
    if(!ok){ err.textContent="That access code isn't right."; btn.disabled=false; btn.textContent="Unlock documents"; return; }
    // record the access (fire-and-forget; never blocks entry)
    try{ if(sb) sb.from("doc_access").insert({ email:email, agreed:true }); }catch(e){}
    try{ localStorage.setItem("kk_vault_email", email); }catch(e){}
    reveal(email);
  }

  function pageImgs(dir,n){
    var html="";
    for(var i=1;i<=n;i++){ html+='<img src="'+dir+'/p'+String(i).padStart(3,"0")+'.jpg" alt="" draggable="false" loading="lazy">'; }
    return html+'<div class="endnote">Confidential · do not distribute.</div>';
  }

  function reveal(email){
    document.getElementById("gate").style.display="none";
    document.getElementById("creativeScreens").innerHTML=pageImgs("vault/creative",CREATIVE_PAGES);
    document.getElementById("docs").style.display="block";
    tab("creative");
    window.scrollTo(0,0);
  }

  function tab(name){
    // lazy-load the iframe docs on first open
    if(IFRAME_SRC[name] && !loaded[name]){ document.getElementById("if-"+name).src=IFRAME_SRC[name]; loaded[name]=true; }
    document.querySelectorAll(".tab").forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-pane")===name); });
    document.querySelectorAll(".pane").forEach(function(p){ p.classList.remove("on"); });
    document.getElementById("pane-"+name).classList.add("on");
  }

  // allow Enter key to submit
  document.getElementById("code").addEventListener("keydown",function(e){ if(e.key==="Enter") unlock(); });
  try{ var _bv=document.querySelector(".bgvid"); if(_bv){ var _p=_bv.play(); if(_p&&_p.catch) _p.catch(function(){}); } }catch(e){}
</script>
</body>
</html>
