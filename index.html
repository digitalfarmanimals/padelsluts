<style>
  :root{

  header.app{display:flex;align-items:center;gap:12px;padding:6px 2px 14px}
  .logo{width:48px;height:48px;flex-shrink:0;display:block}
  .title{font-family:var(--display);font-weight:400;letter-spacing:1px;font-size:40px;line-height:.85;text-transform:uppercase;transform:skewX(-8deg)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:14px 0;box-shadow:var(--shadow)}

  th.active{color:var(--accent)}

  .potbig{font-family:var(--display);font-weight:400;font-size:38px;letter-spacing:.5px;color:var(--gold);margin:2px 0 10px}

  .histitem{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line)}

  .welcome .card{max-width:460px;margin:8px auto 0}
  body.hero{background:
    linear-gradient(180deg, rgba(8,10,15,.5) 0%, rgba(8,10,15,.72) 45%, rgba(8,10,15,.97) 100%),
    url('hero.jpg') center 28%/cover no-repeat;}
  body.hero .welcome{padding-top:8vh}
  body.hero .welcome .card{background:rgba(14,17,24,.74);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.14);box-shadow:0 22px 60px rgba(0,0,0,.55)}
  .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 16px;cursor:pointer;min-height:128px;display:flex;flex-direction:column;justify-content:space-between;transition:transform .05s,border-color .15s;box-shadow:var(--shadow)}

  .small{font-size:12.5px}

  .split{display:flex;gap:12px}
  .split>div{flex:1}

  .progress{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 0 2px}
  .bar{height:7px;background:var(--card2);border-radius:999px;overflow:hidden;flex:1}

  .court{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:14px;margin:12px 0}
  .court .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .court .ch .name{font-weight:800;letter-spacing:.3px}
  .court .ch .tag{font-size:11px}
  .team{display:flex;align-items:center;gap:10px;padding:9px 0}
  .team .names{flex:1;font-weight:700;font-size:15.5px}
  .team .names .amp{color:var(--muted);font-weight:600;margin:0 4px}
  .score{width:72px;text-align:center;font-size:22px;font-weight:800;padding:10px 6px}
  .vs{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase}

  .win{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
  .winbadge{color:var(--accent);font-weight:800;font-size:11px;margin-left:8px}
  .byes{margin-top:10px;font-size:13px;color:var(--muted)}

  table{width:100%;border-collapse:collapse;margin-top:6px}
  th,td{padding:11px 8px;text-align:left;border-bottom:1px solid var(--line);font-size:14.5px}

  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tr.me td{}

  .top1 td{background:linear-gradient(90deg,rgba(200,255,50,.12),transparent)}
  .winnerbanner{text-align:center;background:linear-gradient(160deg,#202a16,#181d26);border:1px solid var(--accent-d);border-radius:var(--radius);padding:22px 16px;margin:14px 0}
  .winnerbanner .crown{font-size:40px}
  .winnerbanner .wname{font-family:var(--display);font-weight:400;font-size:34px;letter-spacing:1px;text-transform:uppercase;margin:6px 0 2px}
  .winnerbanner .wstat{color:var(--accent)}
  .footer{ text-align:center;color:var(--muted);font-size:11.5px;margin-top:20px}

  .actions .btn{flex:1}
  .stack{display:flex;flex-direction:column;gap:10px}

  @media (max-width:420px){ .title{font-size:24px} .score{width:62px;font-size:20px} }

<body>
  <div class="wrap">
    <header class="app">
      <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="KOURT"><circle cx="50" cy="50" r="49" fill="#c8ff32"/><text x="50" y="51" text-anchor="middle" dominant-baseline="central" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="66" fill="#0b0e13">K</text></svg>
      <div>
        <div class="title"><b>K</b>OURT</div>
        <div class="subtitle">Padel</div>
        <div class="tag">Americano &amp; Mexicano · partners shuffled · one winner</div>
      </div>
    </header>
    <div id="app"></div>
    <div class="footer">Auto-saved on this device · works offline 🟢 · <span id="ver"></span></div>
  </div>
  <div id="printArea" aria-hidden="true"></div>

<script>
"use strict";

/* ---------- state ---------- */
const KEY = "padelsluts.v1";
const DEFAULT = { players:[], pointsPerMatch:24, numRounds:5, rounds:[], currentRound:0, phase:"setup", rankBy:"points", mode:"americano", pairing:"smart", buyIn:0, currency:"£", payout:"all" };
let state = load();
let history = loadHistory();
let view = null;
let entered = false;
let potOpen = false;
function togglePot(){ potOpen=!potOpen; render(); }
const EKEY = "padelsluts.email.v1";
function loadEmail(){ try{ return localStorage.getItem(EKEY)||""; }catch(e){ return ""; } }
let userEmail = loadEmail();
function setEmail(v){ userEmail=(v||"").trim(); try{ localStorage.setItem(EKEY, userEmail); }catch(e){} }

function load(){
  try{
    const s = JSON.parse(localStorage.getItem(KEY));
    if(s && typeof s==="object") return Object.assign({}, DEFAULT, s);
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

/* ---------- helpers ---------- */
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function pName(id){ const p=state.players.find(x=>x.id===id); return p?esc(p.name):"?"; }
function plural(n,w){ const suf=(n===1)?"":(/(s|x|z|ch|sh)$/.test(w)?"es":"s"); return n+" "+w+suf; }

/* ---------- round generation: Americano (smart/random) + Mexicano ---------- */
function pairKey(a,b){ return a<b ? a+"|"+b : b+"|"+a; }

// fair byes: players who've sat out least go first to play; ties random
function pickByes(ids){
  const byeCount={}; ids.forEach(id=>byeCount[id]=0);
  state.rounds.forEach(r=> r.byes.forEach(id=>{ if(byeCount[id]!=null) byeCount[id]++; }));
  const ordered=shuffle(ids).sort((a,b)=> byeCount[a]-byeCount[b]);
  return ordered.slice(0, ids.length%4);
}
function chunkTeams(arr){
  const courts=[];
  for(let i=0;i<arr.length;i+=4) courts.push({ teamA:[arr[i],arr[i+1]], teamB:[arr[i+2],arr[i+3]], scoreA:null, scoreB:null });
  return courts;
}
// how often each pair has partnered / faced off so far
function historyCounts(){
  const partner={}, opp={};
  const bump=(m,a,b)=>{ const k=pairKey(a,b); m[k]=(m[k]||0)+1; };
  state.rounds.forEach(r=> r.courts.forEach(c=>{
    bump(partner,c.teamA[0],c.teamA[1]); bump(partner,c.teamB[0],c.teamB[1]);
    c.teamA.forEach(a=> c.teamB.forEach(b=> bump(opp,a,b)));
  }));
  return { partner, opp };
}
// lower = fewer repeats; repeat partners punished 10x harder than repeat opponents
function arrangementCost(courts,partner,opp){
  let cost=0;
  courts.forEach(c=>{
    cost += (partner[pairKey(c.teamA[0],c.teamA[1])]||0)*10;
    cost += (partner[pairKey(c.teamB[0],c.teamB[1])]||0)*10;
    c.teamA.forEach(a=> c.teamB.forEach(b=>{ cost += (opp[pairKey(a,b)]||0); }));
  });
  return cost;
}
// one greedy draw: pair least-used partners, then pit teams with least-faced opponents
function greedyArrange(playing, partner, opp){
  const pool=shuffle(playing);
  const teams=[];
  while(pool.length){
    const a=pool.shift();
    let bi=0, bc=Infinity;
    for(let i=0;i<pool.length;i++){ const c=partner[pairKey(a,pool[i])]||0; if(c<bc){ bc=c; bi=i; if(c===0) break; } }
    teams.push([a, pool.splice(bi,1)[0]]);
  }
  const tpool=shuffle(teams), courts=[];
  while(tpool.length){
    const tA=tpool.shift();
    let bi=0, bc=Infinity;
    for(let i=0;i<tpool.length;i++){
      let c=0; const tB=tpool[i];
      tA.forEach(x=> tB.forEach(y=>{ c+=(opp[pairKey(x,y)]||0); }));
      if(c<bc){ bc=c; bi=i; if(c===0) break; }
    }
    courts.push({ teamA:tA, teamB:tpool.splice(bi,1)[0], scoreA:null, scoreB:null });
  }
  return courts;
}
function buildAmericanoRound(){
  const ids=state.players.map(p=>p.id);
  const byes=pickByes(ids);
  const playing=ids.filter(id=> byes.indexOf(id)<0);
  if(state.pairing==="random" || playing.length<=4) return { courts:chunkTeams(shuffle(playing)), byes };
  // smart: run many greedy draws, keep the one with fewest repeat partners/opponents
  const { partner, opp }=historyCounts();
  let best=null, bestCost=Infinity;
  const attempts=Math.min(400, Math.max(120, playing.length*12));
  for(let t=0;t<attempts;t++){
    const courts=greedyArrange(playing, partner, opp);
    const cost=arrangementCost(courts,partner,opp);
    if(cost<bestCost){ bestCost=cost; best=courts; if(cost===0) break; }
  }
  return { courts:best, byes };
}
function buildMexicanoRound(){
  const ids=state.players.map(p=>p.id);
  const byes=pickByes(ids);
  const playing=new Set(ids.filter(id=> byes.indexOf(id)<0));
  // rank the playing field by points, then group: 1st+4th vs 2nd+3rd on each court
  const ranked=computeStandings().slice()
    .sort((a,b)=> b.points-a.points || b.wins-a.wins || a.name.localeCompare(b.name))
    .map(p=>p.id).filter(id=> playing.has(id));
  const courts=[];
  for(let i=0;i<ranked.length;i+=4){
    const g=ranked.slice(i,i+4);
    courts.push({ teamA:[g[0],g[3]], teamB:[g[1],g[2]], scoreA:null, scoreB:null });
  }
  return { courts, byes };
}
function buildRound(){
  const played = state.rounds.some(r=> r.courts.some(c=> c.scoreA!=null && c.scoreB!=null));
  if(state.mode==="mexicano" && played) return buildMexicanoRound();
  return buildAmericanoRound();
}

/* ---------- standings ---------- */
function computeStandings(){
  const stats={};
  state.players.forEach(p=> stats[p.id]={id:p.id,name:p.name,wins:0,points:0,played:0,draws:0});
  state.rounds.forEach(r=> r.courts.forEach(c=>{
    if(c.scoreA==null||c.scoreB==null) return;
    const aWin=c.scoreA>c.scoreB, bWin=c.scoreB>c.scoreA;
    c.teamA.forEach(id=>{ if(stats[id]){ stats[id].points+=c.scoreA; stats[id].played++; if(aWin)stats[id].wins++; else if(!bWin)stats[id].draws++; }});
    c.teamB.forEach(id=>{ if(stats[id]){ stats[id].points+=c.scoreB; stats[id].played++; if(bWin)stats[id].wins++; else if(!aWin)stats[id].draws++; }});
  }));
  const byPoints=(a,b)=> b.points-a.points || b.wins-a.wins || a.name.localeCompare(b.name);
  const byWins=(a,b)=> b.wins-a.wins || b.points-a.points || a.name.localeCompare(b.name);
  return Object.values(stats).sort(state.rankBy==="wins"?byWins:byPoints);
}

/* ---------- actions ---------- */
function addPlayer(){
  const inp=document.getElementById("nameInput");
  const name=(inp.value||"").trim();
  const err=document.getElementById("setupErr");
  if(!name){ inp.focus(); return; }
  if(state.players.some(p=>p.name.toLowerCase()===name.toLowerCase())){ err.textContent="“"+name+"” is already in the list."; return; }
  state.players.push({id:uid(), name}); err.textContent="";
  save(); render();
  const ni=document.getElementById("nameInput"); if(ni){ ni.value=""; ni.focus(); }
}
function removePlayer(id){ state.players=state.players.filter(p=>p.id!==id); save(); render(); }
function setPoints(v){ state.pointsPerMatch=v; save(); render(); }
function setRounds(v){ state.numRounds=v; save(); render(); }
function setMode(m){ state.mode=m; save(); render(); }
function setPairing(p){ state.pairing=p; save(); render(); }
function setRankBy(v){ state.rankBy=v; save(); if(state.phase==="play") refreshLive(); else render(); }
function rankToggleHTML(){
  const byPts=state.rankBy!=="wins";
  return `<span class="ranktoggle"><span class="rl">Rank by</span>`+
    `<span class="chip ${byPts?'on':''}" onclick="setRankBy('points')">Points</span>`+
    `<span class="chip ${!byPts?'on':''}" onclick="setRankBy('wins')">Wins</span></span>`;
}

/* ---------- the pot 💸 ---------- */
function setBuyIn(v){ state.buyIn=Math.max(0, +v||0); save(); render(); }
function setCurrency(c){ state.currency=c; save(); render(); }
function setPayout(p){ state.payout=p; save(); render(); }
function formatMoney(n){ n=Math.round(n*100)/100; return state.currency + (Number.isInteger(n)? n : n.toFixed(2)); }
function potPayouts(standings){
  const pot=state.buyIn*state.players.length;
  const elig=standings.filter(p=>p.played>0);
  if(!elig.length) return { pot, payouts:[] };
  const schemes={ all:[100], top2:[60,40], top3:[50,30,20] };
  const base=schemes[state.payout]||[100];
  let pct=base.slice(0, Math.min(base.length, elig.length));
  const sum=pct.reduce((a,b)=>a+b,0);
  pct=pct.map(x=> x/sum*100);                 // normalise so the whole pot pays out
  const posPct=elig.map((_,i)=> pct[i]||0);
  const payouts=[]; let i=0;
  while(i<elig.length){                        // split prize evenly across any exact ties
    let j=i;
    while(j+1<elig.length && elig[j+1].wins===elig[i].wins && elig[j+1].points===elig[i].points) j++;
    const groupPct=posPct.slice(i,j+1).reduce((a,b)=>a+b,0)/(j-i+1);
    for(let k=i;k<=j;k++){ if(groupPct>0.0001) payouts.push({ id:elig[k].id, name:elig[k].name, amount: pot*groupPct/100 }); }
    i=j+1;
  }
  return { pot, payouts };
}

}

function archiveCurrent(){
  if(!state.players || !state.players.length) return;
  const hasScores=(state.rounds||[]).some(r=>r.courts.some(c=>c.scoreA!=null));
  if(!hasScores) return;                       // only save games that actually got played
  if(!state.id) state.id=uid();
  const entry={ id:state.id, savedAt:Date.now(), summary:currentSummary(), snapshot:JSON.parse(JSON.stringify(state)) };
  const i=history.findIndex(h=>h.id===state.id);
  if(i>=0) history[i]=entry; else history.unshift(entry);   // upsert by game id (one entry per game)

/* ---------- league / stats (local; same engine powers global later) ---------- */
function standingsOf(snap){
  const stats={};
  (snap.players||[]).forEach(p=>{ stats[p.id]={id:p.id,name:p.name,wins:0,points:0,played:0}; });
  (snap.rounds||[]).forEach(r=>(r.courts||[]).forEach(c=>{
    if(c.scoreA==null||c.scoreB==null) return;
    const aWin=c.scoreA>c.scoreB,bWin=c.scoreB>c.scoreA;
    c.teamA.forEach(id=>{ if(stats[id]){stats[id].points+=c.scoreA;stats[id].played++;if(aWin)stats[id].wins++;} });
    c.teamB.forEach(id=>{ if(stats[id]){stats[id].points+=c.scoreB;stats[id].played++;if(bWin)stats[id].wins++;} });
  }));
  return Object.values(stats).sort((a,b)=> snap.rankBy==="wins" ? (b.wins-a.wins||b.points-a.points) : (b.points-a.points||b.wins-a.wins));
}
function leagueStats(){
  const P={}, pairs={};
  const pl=(name)=>{ const k=name.toLowerCase(); if(!P[k])P[k]={name,tournaments:0,matches:0,wins:0,points:0,titles:0}; P[k].name=name; return P[k]; };
  const addPair=(team,won,score)=>{ if(team.length<2)return; const k=[team[0].toLowerCase(),team[1].toLowerCase()].sort().join('|');
    if(!pairs[k])pairs[k]={a:team[0],b:team[1],games:0,wins:0,points:0}; const pr=pairs[k]; pr.a=team[0];pr.b=team[1];pr.games++;pr.points+=score;if(won)pr.wins++; };
  (history||[]).forEach(e=>{
    const snap=e.snapshot; if(!snap) return;
    const nameById={}; (snap.players||[]).forEach(p=>nameById[p.id]=p.name);
    const seen=new Set();
    (snap.rounds||[]).forEach(r=>(r.courts||[]).forEach(c=>{
      if(c.scoreA==null||c.scoreB==null) return;
      const aWin=c.scoreA>c.scoreB,bWin=c.scoreB>c.scoreA;
      const tA=c.teamA.map(id=>nameById[id]).filter(Boolean), tB=c.teamB.map(id=>nameById[id]).filter(Boolean);
      tA.forEach(n=>{const x=pl(n);x.matches++;x.points+=c.scoreA;if(aWin)x.wins++;seen.add(n.toLowerCase());});
      tB.forEach(n=>{const x=pl(n);x.matches++;x.points+=c.scoreB;if(bWin)x.wins++;seen.add(n.toLowerCase());});
      addPair(tA,aWin,c.scoreA); addPair(tB,bWin,c.scoreB);
    }));
    seen.forEach(k=>{ if(P[k])P[k].tournaments++; });
    const st=standingsOf(snap).filter(p=>p.played>0);
    if(st.length){ const t=st[0]; st.filter(p=>p.wins===t.wins&&p.points===t.points).forEach(w=>pl(w.name).titles++); }
  });
  const players=Object.values(P).map(p=>({...p, lp:p.wins*3+p.titles*15, winrate:p.matches?Math.round(p.wins/p.matches*100):0}))
    .sort((a,b)=> b.lp-a.lp || b.points-a.points || b.winrate-a.winrate || a.name.localeCompare(b.name));
  const duos=Object.values(pairs).map(d=>({...d, winrate:d.games?Math.round(d.wins/d.games*100):0}))
    .filter(d=>d.games>=2).sort((a,b)=> b.wins-a.wins || b.winrate-a.winrate || b.points-a.points).slice(0,8);
  return { players, duos };
}

        <button class="btn cyan sm" onclick="replayFromHistory('${e.id}')">♻️ Replay</button>
        <button class="btn ghost sm" onclick="openFromHistory('${e.id}')">Open</button>
        <button class="btn danger sm" onclick="deleteHistoryItem('${e.id}')">✕</button>
      </div>
    </div>`;
  }).join("") : `<div class="muted" style="padding:10px 0">No saved games yet. Finish a tournament and it lands here automatically.</div>`;
  return `<div class="card">
    <div class="ch" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h2 style="margin:0">📋 Saved games</h2>
      <button class="btn ghost sm" onclick="hideHistory()">← Back</button>
    </div>
    ${list}
    ${items.length?`<hr class="hr" /><button class="btn danger sm" onclick="clearHistory()">Clear all saved games</button>`:''}
  </div>`;
}

function startTournament(){
  const err=document.getElementById("setupErr");
  const pts=Math.max(2, Math.round(+document.getElementById("pointsInput").value||0));
  const rnd=Math.max(1, Math.round(+document.getElementById("roundsInput").value||0));
  if(state.players.length<4){ err.textContent="Add at least 4 players to start a padel match (4 per court)."; return; }
  archiveCurrent();
  state.pointsPerMatch=pts; state.numRounds=rnd;
  state.id=uid(); state.rounds=[]; state.rounds.push(buildRound()); state.currentRound=0; state.phase="play";
  save(); render(); window.scrollTo(0,0);
}

function onScoreInput(el){
  const r=+el.dataset.round, c=+el.dataset.court, team=el.dataset.team;
  const court=state.rounds[r].courts[c];
  const raw=el.value.trim();
  if(raw===""){ court.scoreA=null; court.scoreB=null; }
  else{
    let n=Math.round(+raw); if(isNaN(n))n=0;
    n=Math.max(0, Math.min(state.pointsPerMatch, n));
    if(team==="A"){ court.scoreA=n; court.scoreB=state.pointsPerMatch-n; }
    else{ court.scoreB=n; court.scoreA=state.pointsPerMatch-n; }
  }
  save(); refreshScoreInputs(r,c); refreshLive(); refreshCourtWin(r,c);
}
function refreshScoreInputs(r,c){
  const court=state.rounds[r].courts[c];
  document.querySelectorAll('input[data-round="'+r+'"][data-court="'+c+'"]').forEach(inp=>{
    if(inp===document.activeElement) return;
    const v = inp.dataset.team==="A" ? court.scoreA : court.scoreB;
    inp.value = v==null ? "" : v;
  });
}
function refreshCourtWin(r,c){
  const court=state.rounds[r].courts[c];
  const card=document.getElementById("court-"+r+"-"+c); if(!card) return;
  const a=card.querySelector('[data-side="A"]'), b=card.querySelector('[data-side="B"]');
  [a,b].forEach(x=>{ if(x){ x.classList.remove("win"); const wb=x.querySelector(".winbadge"); if(wb) wb.remove(); }});
  if(court.scoreA==null||court.scoreB==null) return;
  if(court.scoreA>court.scoreB) markWin(a);
  else if(court.scoreB>court.scoreA) markWin(b);
}
function markWin(el){ if(!el) return; el.classList.add("win"); const n=el.querySelector(".names"); if(n && !n.querySelector(".winbadge")){ const s=document.createElement("span"); s.className="winbadge"; s.textContent="WON"; n.appendChild(s);} }

function scoredStatus(){
  const r=state.rounds[state.currentRound];
  const done=r.courts.filter(c=>c.scoreA!=null&&c.scoreB!=null).length;
  return done+" of "+plural(r.courts.length,"match")+" scored";
}
function refreshLive(){
  const live=document.getElementById("livePanel"); if(live) live.innerHTML=liveTableHTML();
  const st=document.getElementById("scoreStatus"); if(st) st.textContent=scoredStatus();
}

function nextRound(){
  if(state.currentRound < state.numRounds-1){
    if(!state.rounds[state.currentRound+1]) state.rounds.push(buildRound());
    state.currentRound++; save(); render(); window.scrollTo(0,0);
  } else { finish(); }
}
function prevRound(){ if(state.currentRound>0){ state.currentRound--; save(); render(); window.scrollTo(0,0);} }
function reshuffle(){
  const ri=state.currentRound;
  state.rounds.splice(ri,1);              // drop current so it doesn't count as its own history
  state.rounds.splice(ri,0,buildRound());
  save(); render();
}
function finish(){ state.phase="results"; archiveCurrent(); save(); render(); window.scrollTo(0,0); }
function backToPlay(){ state.phase="play"; save(); render(); window.scrollTo(0,0); }

function addAnotherRound(){
  state.numRounds += 1;
  state.rounds.push(buildRound());
  state.currentRound = state.rounds.length-1;
  state.phase="play"; save(); render(); window.scrollTo(0,0);
}
function newKeepPlayers(){
  state.rounds=[]; state.currentRound=0; state.phase="setup"; save(); render(); window.scrollTo(0,0);
}
function resetAll(){
  if(!confirm("Clear everything — players, scores, the lot?")) return;
  state=JSON.parse(JSON.stringify(DEFAULT)); save(); render(); window.scrollTo(0,0);
}

/* ---------- render ---------- */
function render(){
  const app=document.getElementById("app");
  document.body.classList.toggle("hero", !entered && !view);
  if(view==="history"){ app.innerHTML=historyHTML(); return; }
  if(view==="league"){ app.innerHTML=leagueHTML(); return; }
  if(view==="stats"){ app.innerHTML=statsHTML(); return; }
  if(view==="friends"){ app.innerHTML=friendsHTML(); return; }
  if(view==="events"){ app.innerHTML=eventsHTML(); return; }
  if(entered && view==="home"){ app.innerHTML=homeHTML(); return; }
  if(!entered){ app.innerHTML=welcomeHTML(); return; }
  if(state.phase==="setup") app.innerHTML=setupHTML();
  else if(state.phase==="play") app.innerHTML=playHTML();
  else app.innerHTML=resultsHTML();
}

    <div class="small muted" style="margin-bottom:14px">${state.mode==='mexicano'
      ? '<b>Mexicano</b> — partners &amp; opponents are set by the live leaderboard each round (winners play winners). Stays competitive right to the end.'
      : '<b>Americano</b> — random partners every round, so everyone plays with and against everyone.'}</div>
    <div class="split">

        <input id="pointsInput" type="number" inputmode="numeric" min="2" value="${state.pointsPerMatch}"
          onchange="setPoints(Math.max(2,Math.round(+this.value||0)))" />
        <div class="chips">${ptsPresets.map(v=>`<span class="chip ${state.pointsPerMatch===v?'on':''}" onclick="setPoints(${v})">${v}</span>`).join("")}</div>

      </div>

        <input id="roundsInput" type="number" inputmode="numeric" min="1" value="${state.numRounds}"
          onchange="setRounds(Math.max(1,Math.round(+this.value||0)))" />
        <div class="chips">${rndPresets.map(v=>`<span class="chip ${state.numRounds===v?'on':''}" onclick="setRounds(${v})">${v}</span>`).join("")}</div>
        <div class="small muted" style="margin-top:8px">${plan}</div>
      </div>
    </div>
    ${state.mode!=='mexicano' ? `<hr class="hr" />
    <label class="fld">Pairing</label>

    </div>
    <div class="small muted" style="margin-top:8px">${state.pairing==='random' ? 'Pure luck of the draw each round.' : 'Avoids repeat partners for as long as possible, so the mix stays fresh.'}</div>` : ''}
    <hr class="hr" />
    <label class="fld">Final ranking</label>
    ${rankToggleHTML()}
    <div class="small muted" style="margin-top:8px">Total points is the fairest default when partners are random. Switch to wins if you'd rather.</div>
    <hr class="hr" />
    <div class="potHead" onclick="togglePot()">

      <span class="potTog">${(!potOpen && state.buyIn>0)?`<span class="pill">${formatMoney(state.buyIn)} buy-in</span>`:''}${potOpen?'▾':'▸'}</span>

function teamRowHTML(r,c,side,ids,score){
  const names=`${pName(ids[0])}<span class="amp">+</span>${pName(ids[1])}`;
  return `<div class="team" data-side="${side}">
      <div class="names">${names}</div>
      <input class="score" type="number" inputmode="numeric" min="0" max="${state.pointsPerMatch}"
        data-round="${r}" data-court="${c}" data-team="${side}"
        value="${score==null?'':score}" placeholder="–" oninput="onScoreInput(this)" />
    </div>`;
}

function courtHTML(r,ci,court){
  return `<div class="court" id="court-${r}-${ci}">
    <div class="ch"><span class="name">🏟️ Court ${ci+1}</span><span class="pill tag">to ${state.pointsPerMatch}</span></div>
    ${teamRowHTML(r,ci,"A",court.teamA,court.scoreA)}
    <div class="vs">vs</div>
    ${teamRowHTML(r,ci,"B",court.teamB,court.scoreB)}

}

function playHTML(){
  const ri=state.currentRound, round=state.rounds[ri];
  const pct=Math.round(((ri+1)/state.numRounds)*100);
  const courtsHTML=round.courts.map((c,ci)=>courtHTML(ri,ci,c)).join("");
  const byesHTML=round.byes.length
    ? `<div class="byes">😴 Sitting out: <b>${round.byes.map(pName).join(", ")}</b></div>` : "";
  const isLast = ri===state.numRounds-1;

  return `
  <div class="card">
    <div class="progress">
      <span><span class="pill">Round ${ri+1} / ${state.numRounds}</span> <span class="pill">${state.mode==='mexicano'?'🇲🇽 Mexicano':'🎾 Americano'}</span></span>
      <span class="small muted" id="scoreStatus">${scoredStatus()}</span>
    </div>
    <div class="bar"><span style="width:${pct}%"></span></div>
  </div>

  <div class="card">
    <div class="ch" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <h2 style="margin:0">Matches</h2>
      ${state.mode==='mexicano' ? `<span class="pill" style="align-self:center">Set by leaderboard</span>` : `<button class="btn ghost sm" onclick="reshuffle()">🎲 Reshuffle</button>`}
    </div>
    ${courtsHTML}
    ${byesHTML}
  </div>

  <div class="card">
    <details>
      <summary>Standings so far</summary>
      <div id="livePanel" class="live">${liveTableHTML()}</div>
    </details>
  </div>

  <div class="actions">
    ${ri>0?`<button class="btn ghost" onclick="prevRound()">← Back</button>`:""}
    <button class="btn primary" onclick="nextRound()">${isLast?"Finish 🏆":"Next round →"}</button>
  </div>
  <div class="actions" style="justify-content:center;gap:18px;flex-wrap:wrap">
    <button class="btn ghost sm" style="flex:0" onclick="finish()">Finish early</button>
    <button class="btn ghost sm" style="flex:0" onclick="newGame(false)">🆕 New game</button>
    ${history.length?`<button class="btn ghost sm" style="flex:0" onclick="showHistory()">📋 Saved (${history.length})</button>`:""}
  </div>
  `;
}

function liveTableHTML(){
  const s=computeStandings();
  const toggle=`<div style="margin-bottom:10px">${rankToggleHTML()}</div>`;
  if(!s.some(x=>x.played)) return toggle+`<div class="muted small" style="padding:4px 0">Enter some scores to see the table.</div>`;
  const wA=state.rankBy==="wins"?" active":"", pA=state.rankBy!=="wins"?" active":"";
  return toggle+`<table><thead><tr><th class="rank">#</th><th>Player</th><th class="num${wA}">W</th><th class="num${pA}">Pts</th></tr></thead><tbody>
    ${s.map((p,i)=>`<tr><td class="rank">${i+1}</td><td>${esc(p.name)}</td><td class="num${wA}">${p.wins}</td><td class="num${pA}">${p.points}</td></tr>`).join("")}
  </tbody></table>`;
}

function resultsHTML(){
  const s=computeStandings();
  const played=s.some(x=>x.played);
  const top=s[0];
  const winners = played ? s.filter(p=>p.wins===top.wins && p.points===top.points) : [];
  const medals=["🥇","🥈","🥉"];

  const banner = !played
    ? `<div class="card"><div class="muted">No scores were entered, so there's no winner yet.</div></div>`
    : `<div class="winnerbanner">
        <div class="crown">👑</div>
        <div class="wname">${winners.map(w=>esc(w.name)).join(" & ")}</div>
        <div class="wstat">${winners.length>1?"Tied champions":"Champion"} · ${plural(top.wins,"win")} · ${top.points} points</div>
      </div>`;

  const wA=state.rankBy==="wins"?" active":"", pA=state.rankBy!=="wins"?" active":"";
  const table = `<div class="card">
    <div class="ch" style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px">
      <h2 style="margin:0">Final standings</h2>
      ${rankToggleHTML()}
    </div>
    <table><thead><tr><th class="rank">#</th><th>Player</th><th class="num">Played</th><th class="num${wA}">Wins</th><th class="num${pA}">Points</th></tr></thead>
    <tbody>
    ${s.map((p,i)=>`<tr class="${i===0&&played?'top1':''}">
      <td class="rank">${played&&i<3?medals[i]:(i+1)}</td>
      <td>${esc(p.name)}</td>
      <td class="num">${p.played}</td>
      <td class="num${wA}">${p.wins}</td>
      <td class="num${pA}">${p.points}</td>
    </tr>`).join("")}
    </tbody></table>
  </div>`;

  const potHTML = state.buyIn>0 ? potCardHTML(s, played) : "";

  return `
  ${banner}
  ${table}
  ${potHTML}
  <div class="card stack">
    <div class="actions">
      <button class="btn ghost" onclick="backToPlay()">← Back to rounds</button>
      <button class="btn cyan" onclick="addAnotherRound()">➕ Add a round</button>
    </div>
    <div class="actions">
      <button class="btn primary" onclick="newGame(false)">🆕 New game</button>
      <button class="btn ghost" onclick="newGame(true)">Rematch — same players</button>
    </div>
    <div class="actions">
      <button class="btn ghost" onclick="exportPDF()">📄 Export PDF</button>
      <button class="btn ghost" onclick="showHistory()">📋 Saved (${history.length})</button>
    </div>
    <button class="btn ghost block" onclick="goHome()">⌂ Home</button>
  </div>`;
}

/* ---------- cloud sync of games (KOURT Supabase; signed-in users only) ---------- */
async function cloudSaveGame(entry){
  if(!sb||!authUser||!entry||!entry.id) return;
  try{
    await sb.from("games").upsert({
      user_id: authUser.id, game_id: entry.id,
      snapshot: entry.snapshot, summary: entry.summary||null,
      saved_at: new Date(entry.savedAt||Date.now()).toISOString()
    }, { onConflict: "user_id,game_id" });
  }catch(e){}
}
async function cloudDeleteGame(id){
  if(!sb||!authUser||!id) return;
  try{ await sb.from("games").delete().eq("user_id", authUser.id).eq("game_id", id); }catch(e){}
}
async function cloudLoadGames(){
  if(!sb||!authUser) return;
  try{
    const res = await sb.from("games").select("game_id,snapshot,summary,saved_at").eq("user_id", authUser.id);
    if(res.error || !res.data) return;
    const byId={}; history.forEach(function(h){ byId[h.id]=h; });
    const inCloud={};
    res.data.forEach(function(row){
      inCloud[row.game_id]=true;
      const savedAt = row.saved_at ? Date.parse(row.saved_at) : Date.now();
      const ex = byId[row.game_id];
      if(!ex || savedAt > (ex.savedAt||0)) byId[row.game_id]={ id:row.game_id, savedAt:savedAt, summary:row.summary||{}, snapshot:row.snapshot };
    });
    history = Object.keys(byId).map(function(k){ return byId[k]; }).sort(function(a,b){ return b.savedAt-a.savedAt; });
    saveHistory(); render();
    for(var i=0;i<history.length;i++){ if(!inCloud[history[i].id]) await cloudSaveGame(history[i]); }
  }catch(e){}
}
